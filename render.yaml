services:
  - type: web
    name: c2-scanner
    runtime: python
    buildCommand: npm run install-all && npm run build-all && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PORT
        value: 10000
      - key: C2_DATA_DIR
        value: /tmp
    plan: free
