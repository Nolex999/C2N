services:
  - type: web
    name: c2-scanner
    runtime: python
    buildCommand: pip install -r requirements.txt && npm install && npm run install-all && npm run build-all
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: PY_WORKER_PORT
        value: 10001
      - key: C2_DATA_DIR
        value: /tmp
      - key: RENDER
        value: "true"
      - key: SCAN_CAP
        value: "5000"
    plan: free
